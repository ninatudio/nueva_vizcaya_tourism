<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waterfalls & Rivers – Nueva Vizcaya Tourism</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <section class="nv-hero nv-hero-sm banner-falls">
    <div class="text-center px-3">
      <div class="gold-badge">Water Wonders</div>
      <h1>WATERFALLS & RIVERS</h1>
      <h3>Cool Off in Nueva Vizcaya's Pristine Waters</h3>
    </div>
  </section>

  <section class="section-pad">
    <div class="container">
      <div class="text-center mb-5">
        <h2 class="section-title">Waterfalls & River Destinations</h2>
        <div class="section-divider mx-auto"></div>
        <p class="section-subtitle">Cascading waterfalls and pristine rivers are among Nueva Vizcaya's most treasured natural attractions.</p>
      </div>
      <div class="row g-4" id="destinationsContainer"></div>
    </div>
  </section>

  <div id="modal-placeholder"></div>
  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const falls = destinations.filter(d => d.category === 'Waterfall');
      renderDestinationCards(falls, 'destinationsContainer');
    });
  </script>
</body>
</html>
